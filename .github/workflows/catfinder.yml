name: Catfinder täglich

on:
  schedule:
    - cron: "0 7 * * *"   # 09:00 Uhr CEST (Sommerzeit) / 08:00 Uhr CET (Winterzeit)
    - cron: "0 14 * * *"  # 16:00 Uhr CEST (Sommerzeit) / 15:00 Uhr CET (Winterzeit)
  workflow_dispatch:       # Manuell auslösbar

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: API-Key-Fingerprint (Debug)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, hashlib
          k = os.environ.get("ANTHROPIC_API_KEY", "")
          print(f"Length     : {len(k)}")
          print(f"Prefix     : {k[:15]}")
          print(f"Suffix     : {k[-4:]}")
          print(f"SHA256-8   : {hashlib.sha256(k.encode()).hexdigest()[:8]}")
          EOF

      - name: Catfinder ausführen
        id: catfinder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python catfinder.py --no-browser

      - name: Report für GitHub Pages vorbereiten
        run: |
          mkdir -p docs
          python3 - <<'EOF'
          content = open("reports/report.html", encoding="utf-8").read()
          banner = (
            '<div style="background:#1565c0;color:#fff;text-align:center;padding:12px;font-family:sans-serif;font-size:15px;">'
            '<a href="https://aleks-muc.github.io/catfinder/" '
            'style="color:#fff;font-weight:bold;text-decoration:none;">&#127760; Im Browser öffnen →</a>'
            '</div>'
          )
          content = content.replace("<body>", "<body>" + banner, 1)
          open("reports/report.html", "w", encoding="utf-8").write(content)
          open("docs/index.html", "w", encoding="utf-8").write(content)
          EOF

      - name: State committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_cats.json docs/index.html
          git diff --cached --quiet || git commit -m "chore: state & report aktualisiert [skip ci]"
          git push

      - name: E-Mail senden
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: smtp.sendgrid.net
          server_port: 465
          secure: true
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "Catfinder – ${{ steps.catfinder.outputs.new_count }} neue Katzen"
          to: ${{ secrets.MAIL_TO }}
          from: "Catfinder <${{ secrets.MAIL_FROM }}>"
          html_body: file://reports/report.html
